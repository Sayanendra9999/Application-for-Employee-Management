<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 — Forbidden</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="background:var(--body-bg);">
    <div class="d-flex align-items-center justify-content-center" style="min-height:100vh;">
        <div class="text-center">
            <div style="font-size:5rem; font-weight:800; color:var(--danger); line-height:1;">403</div>
            <h3 class="fw-bold mt-3 mb-2">Access Denied</h3>
            <p style="color:var(--text-secondary); max-width:400px; margin:0 auto 24px;">
                You don't have permission to access this page. Contact your administrator to request access.
            </p>
            <a href="{{ url_for('main_dashboard') }}" class="btn btn-primary">
                <i class="fas fa-home me-2"></i>Back to Dashboard
            </a>
        </div>
    </div>
</body>
</html>
